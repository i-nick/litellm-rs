name: Auto Update Model Prices

on:
  schedule:
    # 每周日 UTC 00:00 运行
    - cron: "0 0 * * 0"
  workflow_dispatch:
    # 允许手动触发

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install aiohttp

      - name: Update model prices
        run: python scripts/sync_models.py --output json > /tmp/openrouter_models.json

      - name: Merge with existing data
        run: |
          python3 << 'EOF'
          import json
          from datetime import datetime

          # Load existing data
          try:
              with open("data/model_prices.json") as f:
                  existing = json.load(f)
          except FileNotFoundError:
              existing = {"_metadata": {}}

          # Load new data from OpenRouter
          with open("/tmp/openrouter_models.json") as f:
              new_models = json.load(f)

          # Update metadata
          existing["_metadata"] = {
              "version": "1.0.0",
              "updated_at": datetime.utcnow().isoformat() + "Z",
              "source": "https://openrouter.ai/api/v1/models"
          }

          # Merge models (update existing, add new)
          for model in new_models:
              provider = model.get("provider", "unknown")
              name = model.get("name", "")
              key = f"{provider}/{name}"

              existing[key] = {
                  "input_cost_per_token": model.get("input_cost_per_million", 0) / 1_000_000,
                  "output_cost_per_token": model.get("output_cost_per_million", 0) / 1_000_000,
                  "max_input_tokens": model.get("context_length", 0),
                  "max_output_tokens": 16384,  # Default, OpenRouter doesn't always provide this
                  "litellm_provider": provider,
                  "mode": "chat",
                  "supports_function_calling": model.get("supports_tools", False),
                  "supports_vision": model.get("supports_vision", False)
              }

          # Write back
          with open("data/model_prices.json", "w") as f:
              json.dump(existing, f, indent=2, sort_keys=True)

          print(f"Updated {len(new_models)} models")
          EOF

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet data/model_prices.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(models): auto-update model prices from OpenRouter"
          title: "[Auto] Update model prices - ${{ github.run_id }}"
          body: |
            ## Automated Model Price Update

            This PR was automatically generated by the model price sync workflow.

            **Source:** OpenRouter API
            **Date:** ${{ github.event.repository.updated_at }}

            ### Changes
            - Updated model pricing information
            - Added any new models from OpenRouter

            ### Review Checklist
            - [ ] Verify pricing changes are reasonable
            - [ ] Check for any removed models
            - [ ] Ensure no breaking changes

            ---
            *This PR was created automatically by GitHub Actions*
          branch: auto-update-model-prices
          delete-branch: true
          labels: |
            automated
            models
            pricing
